<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>알람 설정 - Danal API Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles/tailwind.css" />
    <link rel="stylesheet" href="/styles/common.css" />
    <link rel="stylesheet" href="/styles/alert-config.css" />
</head>
<body class="min-h-screen app-bg">
    <div class="max-w-4xl mx-auto p-6 space-y-8">
        <!-- 헤더 -->
        <header class="glass-effect rounded-2xl p-6 neo-shadow floating-card">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 via-purple-500 to-purple-600 flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5v-5zM9 7H4l5-5v5z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 via-purple-600 to-blue-800 bg-clip-text text-transparent">알람 설정</h1>
                        <p class="text-sm font-medium t-sec">API 모니터링 알람을 설정합니다</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="themeToggle" class="w-10 h-10 rounded-lg flex items-center justify-center transition-all duration-300 bg-ter-var t-pri" onmouseover="this.style.background='var(--border-color)'" onmouseout="this.style.background='var(--bg-tertiary)'" title="다크모드 토글">
                        <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <a href="/" class="px-6 py-3 bg-gradient-to-r from-slate-600 to-slate-700 text-white rounded-xl hover:from-slate-700 hover:to-slate-800 transition-all duration-300 glow-on-hover font-medium">
                        ← 대시보드
                    </a>
                </div>
            </div>
        </header>

        <!-- 현재 설정 상태 -->
        <section class="glass-effect rounded-2xl p-6 neo-shadow floating-card">
            <h2 class="text-xl font-bold mb-6 t-pri">현재 설정 상태</h2>
            <div id="currentStatus" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 동적으로 채워짐 -->
            </div>
        </section>

        <!-- 웹훅 URL 설정 -->
        <section class="glass-effect rounded-2xl p-6 neo-shadow floating-card">
            <h2 class="text-xl font-bold mb-2 t-pri">웹훅 URL 설정</h2>
            <p class="text-sm mb-6 t-sec">네이버 웍스 웹훅 URL을 입력하세요. 알람 전송에 사용됩니다.</p>
            <form id="webhookForm" class="space-y-4">
                <div class="flex gap-3">
                    <input type="url" id="webhook_url_input"
                        placeholder="https://talk.worksmobile.com/webhook/..."
                        class="flex-1 px-4 py-3 rounded-xl border font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 bg-sec-var t-pri bd-c">
                    <button type="submit" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl hover:from-blue-700 hover:to-purple-700 transition-all duration-300 font-semibold glow-on-hover whitespace-nowrap">
                        저장
                    </button>
                    <button type="button" id="testAlertBtn" class="px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-xl hover:from-green-600 hover:to-green-700 transition-all duration-300 font-semibold glow-on-hover whitespace-nowrap">
                        테스트 전송
                    </button>
                </div>
            </form>
        </section>

        <!-- 알람 설정 -->
        <section class="glass-effect rounded-2xl p-6 neo-shadow floating-card">
            <h2 class="text-xl font-bold mb-6 t-pri">알람 설정</h2>
            <form id="alertConfigForm" class="space-y-8">
                <!-- 전체 알람 활성화 -->
                <div class="flex items-center justify-between p-6 rounded-2xl border bg-sec-var bd-c">
                    <div>
                        <h3 class="text-lg font-semibold t-pri">알람 시스템 활성화</h3>
                        <p class="text-sm font-medium mt-1 t-sec">모든 알람 기능의 총 스위치입니다</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="run_event_alert">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- 세부 알람 설정 -->
                <div id="detailSettings" class="space-y-6 opacity-50 pointer-events-none transition-all duration-500">
                    <h3 class="text-lg font-semibold t-pri">세부 알람 설정</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-1 gap-6">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="alert_on_start">
                            <span class="checkmark"></span>
                            <div class="ml-2">
                                <span class="font-semibold t-pri">실행 시작 알람</span>
                                <p class="text-sm mt-1 t-sec">테스트 실행이 시작될 때 알람을 보냅니다</p>
                            </div>
                        </label>

                        <label class="custom-checkbox">
                            <input type="checkbox" id="alert_on_success">
                            <span class="checkmark"></span>
                            <div class="ml-2">
                                <span class="font-semibold t-pri">실행 성공 알람</span>
                                <p class="text-sm mt-1 t-sec">테스트가 성공적으로 완료되었을 때 알람을 보냅니다</p>
                            </div>
                        </label>

                        <label class="custom-checkbox">
                            <input type="checkbox" id="alert_on_error">
                            <span class="checkmark"></span>
                            <div class="ml-2">
                                <span class="font-semibold t-pri">실행 실패 알람</span>
                                <p class="text-sm mt-1 t-sec">테스트가 실패했을 때 알람을 보냅니다</p>
                            </div>
                        </label>
                    </div>

                    <!-- 알람 방식 선택 -->
                    <div class="pt-6 border-t bd-c">
                        <h4 class="text-lg font-semibold mb-4 t-pri">알람 방식</h4>
                        <div class="space-y-3">
                            <label class="custom-radio">
                                <input type="radio" name="alert_method" value="text">
                                <span class="checkmark"></span>
                                <span class="font-medium t-pri">텍스트 메시지</span>
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="alert_method" value="flex">
                                <span class="checkmark"></span>
                                <span class="font-medium t-pri">Flex 메시지 (카드 형태)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 저장 버튼 -->
                <div class="flex justify-end pt-8">
                    <button type="submit" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl hover:from-blue-700 hover:to-purple-700 transition-all duration-300 font-semibold glow-on-hover">
                        설정 저장
                    </button>
                </div>
            </form>
        </section>

        <!-- 정기 리포트 설정 -->
        <section class="glass-effect rounded-2xl p-6 neo-shadow floating-card">
            <h2 class="text-xl font-bold mb-6 t-pri">정기 리포트 설정</h2>
            <form id="dailyReportForm" class="space-y-6">
                <!-- 정기 리포트 활성화 -->
                <div class="flex items-center justify-between p-6 rounded-2xl border bg-sec-var bd-c">
                    <div>
                        <h3 class="text-lg font-semibold t-pri">일일 통계 리포트</h3>
                        <p class="text-sm font-medium mt-1 t-sec">지정된 시간에 Today's Execution Statistics를 발송합니다</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="daily_report_enabled">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- 세부 설정 -->
                <div id="dailyReportSettings" class="space-y-6 opacity-50 pointer-events-none transition-all duration-500">
                    <!-- 발송 시간 (여러 개 등록 가능) -->
                    <div class="p-4 rounded-xl border bg-sec-var bd-c">
                        <div class="flex items-center justify-between mb-3">
                            <h4 class="text-md font-semibold t-pri">발송 시간</h4>
                            <button type="button" id="addTimeBtn" class="px-3 py-1 text-sm bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-all">
                                + 시간 추가
                            </button>
                        </div>
                        <div id="timesList" class="space-y-2">
                            <!-- 시간 입력 필드들이 여기에 동적으로 추가됨 -->
                        </div>
                    </div>

                    <!-- 발송 요일 -->
                    <div class="p-4 rounded-xl border bg-sec-var bd-c">
                        <h4 class="text-md font-semibold mb-3 t-pri">발송 요일</h4>
                        <div class="flex flex-wrap gap-2">
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="1" checked>
                                <span class="day-label">월</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="2" checked>
                                <span class="day-label">화</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="3" checked>
                                <span class="day-label">수</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="4" checked>
                                <span class="day-label">목</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="5" checked>
                                <span class="day-label">금</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="6">
                                <span class="day-label">토</span>
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" name="daily_report_days" value="0">
                                <span class="day-label">일</span>
                            </label>
                        </div>
                    </div>

                    <!-- 테스트 발송 버튼 -->
                    <div class="flex justify-start">
                        <button type="button" id="testDailyReport" class="px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-xl hover:from-green-600 hover:to-green-700 transition-all duration-300 font-semibold glow-on-hover">
                            테스트 발송
                        </button>
                    </div>
                </div>

                <!-- 저장 버튼 -->
                <div class="flex justify-end pt-4">
                    <button type="submit" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl hover:from-blue-700 hover:to-purple-700 transition-all duration-300 font-semibold glow-on-hover">
                        설정 저장
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script src="/scripts/alert-config.js" defer></script>
</body>
</html>
