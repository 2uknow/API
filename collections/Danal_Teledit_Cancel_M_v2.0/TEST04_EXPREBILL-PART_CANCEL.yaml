
name: "EXPREBILL-PART_CANCEL SMS 비점유결제 부분취소"
description: "Danal_Taldit_PART_CANCEL_v1.0 자동화 테스트"
version: "1.0.0"


# 공통 변수 불러오기
include: ../../environments/Teledit_conf.yaml


# ** ----------------------------------------------------------------------------------------------------------------
#  * EXPREBILL
#  * ----------------------------------------------------------------------------------------------------------------*

steps:
  - name: "EXPREBILL"
    description: "비점유 결제 + AUTHKEY 전송"

    args:
      Command: "EXPREBILL"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      ItemCount: "1"
      ItemType: "0"
      ItemInfo: "2|301|1|22S0HZ0100|상품명" 
      AUTHKEY: "{{KT_AUTH}}"
      ORDERID: "{{ORDER_ID_R}}"
      OUTPUTOPTION: "3"
      TIDTYPE: "1"
      IFVERSION: "V1.1.2"
      BILLTYPE: "1"

    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "RESULT_CODE"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "ERROR_MESSAGE"

      - name: "tid"
        pattern: "TID"
        variable: "TID"

      - name: "date"
        pattern: "Date"
        variable: "DATE"

      - name: "totalAmount"
        pattern: "TotalAmount"
        variable: "TOTAL_AMOUNT"

      - name: "cap"
        pattern: "Cap"
        variable: "CAP"

      - name: "orderid"
        pattern: "Orderid"
        variable: "ORDER_ID"

      - name: "dstAddr"
        pattern: "DstAddr"
        variable: "DSTADDR"

      - name: "carrier"
        pattern: "Carrier"
        variable: "CARRIER"

      - name: "dntid"
        pattern: "Dntid"
        variable: "DN_TID"
    

####################################################### Assertion ###########################################################


    test:
      # KT 휴대폰결제 미동의 상태인 경우 해당 검증만 진행
      - run_if: "RESULT_CODE == 531"
        assertions:
          - name: "결과 코드(RESULT) 정상 출력"
            assertion: "RESULT_CODE == 531"

          - name: "결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ERROR_MESSAGE == 휴대폰결제 이용 미동의 상태입니다. 해당 통신사 고객센터(114)/홈페이지/고객센터 APP에서 휴대폰결제 이용 동의 후 이용하십시오."
      
      # KT 휴대폰결제 차단 상태인 경우 해당 검증만 진행
      - run_if: "RESULT_CODE == 422"
        assertions:
          - name: "결과 코드(RESULT) 정상 출력"
            assertion: "RESULT_CODE == 422"

          - name: "결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ERROR_MESSAGE == 통신사 정책에 의한 휴대폰결제 차단 상태입니다. 해당 통신사 고객센터(114)/홈페이지/고객센터 APP에서 휴대폰결제 차단 해제 후 이용하십시오."

      # 성공(0)인 경우 실행
      - run_if: "RESULT_CODE == 0"
        assertions:
          - name: "결과 코드(RESULT) 정상 출력"
            assertion: "RESULT_CODE == 0"

          - name: "결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ERROR_MESSAGE == No Information"
                
          - name: "거래 번호(TID) 정상 출력"
            assertion: "js: (
              TID !== null &&
              typeof TID !== 'undefined' &&
              typeof TID === 'string' &&
              TID.trim().length === 18)"

          - name: "결제 완료 시간(Date) 정상 출력_1"
            assertion: "js: (
              DATE !== null &&
              typeof DATE !== 'undefined' &&
              typeof DATE === 'string' &&
              DATE.trim().length === 14)"

          - name: "결제 완료 시간(Date) 정상 출력_2"
            description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~2분 중 하나라도 일치하면 PASS 처리"
            assertion: "js: (() => {
              if (!DATE || DATE.length < 12) return false;

              const tidPrefix = DATE.slice(0, 12);

              const pad = n => String(n).padStart(2, '0');
              const now = new Date();

              for (let i = 0; i <= 2; i++) {
                const d = new Date(now);
                d.setMinutes(d.getMinutes() - i);

                const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
                if (tidPrefix === t) return true;
              }
              return false;})()"

          - name: "전체 결제금액(TotalAmount) 정상 출력"
            assertion: "TOTAL_AMOUNT == 301"
          
          - name: "거래 전 한도 금액(CAP) 정상 출력"
            assertion: "CAP == 000000"

          - name: "CP 주문번호(ORDERID) 정상 출력"
            assertion: "js: (
              typeof ORDER_ID !== 'undefined' &&
              typeof ORDER_ID === 'string' &&
              ORDER_ID.trim().length > 0 &&
              ORDER_ID.includes('ORD'))"

          - name: "사용자 전화번호(DstAddr) 정상 출력"
            assertion: "DSTADDR == 01097966634"

          - name: "인증 받은 통신사 정보(Carrier) 정상 출력"
            assertion: "CARRIER == KTF"

          - name: "거래 번호(DNTID) 정상 출력_1"
            assertion: "js: DN_TID && DN_TID.trim().length > 0 && /^\\d{22}$/.test(DN_TID)"

          - name: "거래 번호(DNTID) 정상 출력_2"
            description: "DN_TID = yyyy + 원거래 TID 일치 확인"
            assertion: "js: (() => {
              const d = new Date();
              const now12 = String(d.getFullYear());
              return DN_TID === (now12 + TID);})()"

# ** ----------------------------------------------------------------------------------------------------------------
#  * PART_CANCEL - 원거래 TID 사용 부분 취소
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "PART_CANCEL - 1차 부분 취소"
    description: "1차 원거래 TID 사용 부분 취소 및 환불 정상 확인"

    args:
      Command: "PART_CANCEL"
      IFVERSION: "V1.2.1"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      O_TID: "{{TID}}"  # 원거래 TID를 사용
      CAMT: "100"

  # 응답 데이터 추출
    extract:
      - name: "Result"
        pattern: "Result"
        variable: "P_RESULT"

      - name: "ErrMsg"
        pattern: "ErrMsg"
        variable: "P_ErrMsg"

      - name: "ServerInfo"
        pattern: "ServerInfo"
        variable: "P_ServerInfo" 

      - name: DNTID"
        pattern: "DNTID"
        variable: "P_DNTID"

      - name: "DNTID"
        pattern: "js: String(vars.P_DNTID).slice(4)"
        variable: "NEW_TID"

      - name: "Date"
        pattern: "Date"
        variable: "P_DATE"

      - name: "O_TID"
        pattern: "O_TID"
        variable: "P_O_TID"

    # KT 통신사 휴대폰결제 차단/미동의 상태인 경우 해당 시나리오 Skip 처리
    skip_if:
      - condition: "js: (RESULT_CODE == 422 || RESULT_CODE == 531)"
        action: "skip_remaining_steps"
        reason: "KT 통신사 휴대폰결제 차단/미동의 상태로 이후 시나리오를 진행하지 않음"


##############################################  Assertion  ###################################################


    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "P_RESULT == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "P_ErrMsg ==No Information"

      - name: "거래인증 key(ServerInfo) 정상 출력"
        assertion: "js: P_ServerInfo !== null && P_ServerInfo.trim().length > 0 && P_ServerInfo !== undefined" 

      - name: "거래 번호(DNTID) 정상 출력_1"
        assertion: "js: P_DNTID && P_DNTID.trim().length > 0 && /^\\d{22}$/.test(P_DNTID)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "EXPREBILL DNTID와 다른 값 생성 확인"
        assertion: "js: (() => {
          'use strict';
          if (typeof P_DNTID === 'undefined' || typeof P_DNTID === 'undefined') return false;
          return String(P_DNTID).trim() !== String(DN_TID).trim();})()"

      - name: "결제 완료 시간(Date) 정상 출력_1"
        assertion: "js: P_DATE && P_DATE.trim().length > 0 && /^\\d{14}$/.test(P_DATE)"

      - name: "결제 완료 시간(Date) 정상 출력_2"
        description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~2분 중 하나라도 일치하면 PASS 처리"
        assertion: "js: (() => {
          if (!P_DATE || P_DATE.length < 12) return false;

          const tidPrefix = P_DATE.slice(0, 12);

          const pad = n => String(n).padStart(2, '0');
          const now = new Date();

          for (let i = 0; i <= 2; i++) {
            const d = new Date(now);
            d.setMinutes(d.getMinutes() - i);

            const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
            if (tidPrefix === t) return true;
          }
          return false;})()"

      - name: "원거래 TID(O_TID) 정상 출력"
        description: 1차 부분취소 TID와 원거래 TID 일치 확인
        assertion: "js: P_O_TID && P_O_TID === TID"

# 시나리오 설정
options:
  stopOnError: false
  timeout: 40000
  retryCount: 0