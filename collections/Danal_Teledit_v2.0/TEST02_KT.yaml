
name: "KT 알뜰 SMS 정상케이스"
description: "Danal_Taldit_v1.0 자동화 테스트"
version: "1.0.0"

# 공통 변수 불러오기
include: Danal_Teledit_Cancel_D_v1.0/conf.yaml

# ** ----------------------------------------------------------------------------------------------------------------
#  * [1차 호출] ITEMSEND2
#  * ----------------------------------------------------------------------------------------------------------------*


steps:
  - name: "ITEMSEND2"
    description: "가맹점 인증 및 상품정보 검증 요청"

    args:
      Command: "ITEMSEND2"
      IFVERSION: "V1.1.7"
      Configure: "FAILURE"
      SERVICE: "{{SERVICE_NAME}}"
      ItemType: "Amount"
      ItemCount: "1"
      OUTPUTOPTION: "DEFAULT"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      ItemInfo: "2|301|1|22S0HZ0100|상품명"
      SUBCP: "DETEST"
      USERID: "{{USER_ID}}"
      ORDERID: "{{ORDER_ID_R}}"
      IsPreOtbill: "N"
      IsOpenMarket: "N"
      SellerName: ""
      SellerTel: ""
      IsSubscript: "N"
      EMAIL: "{{EMAIL}}"
          
    
    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "RESULT_CODE"

      - name: "serverInfo"
        pattern: "ServerInfo"
        variable: "SERVER_INFO"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "ERROR_MESSAGE"

      - name: "WEBINFO"
        pattern: "WEBINFO"
        variable: "WEB_INFO"
    
########################################################### Assertion ###########################################################

    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "RESULT_CODE == 0"

      - name: "거래 인증 key(ServerInfo) 정상 출력"
        assertion: "js: SERVER_INFO !== null && SERVER_INFO.trim().length > 0 && typeof SERVER_INFO  !== undefined" 

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "ERROR_MESSAGE == No Information"

      - name: "웹 페이지로 전달 암호화 데이터(WEBINFO) 고정값 정상 출력"
        assertion: "WEB_INFO == 70f7e5d28c85e70da05270998cd17bab6df543c04843f00036790f642f1dcad90f7b11e3e4cd588c398a"

# ** ----------------------------------------------------------------------------------------------------------------
#  * [2차 호출] IDELIVER
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "IDELIVER"
    description: "사용자정보 인증 및 승인번호 발송 요청"

    args:
      ServerInfo: "{{SERVER_INFO}}"
      IDEN: "{{KT_IDEN}}"
      ISPREOTBILL: "N"
      DSTADDR: "{{KT_DST_ADDR}}"
      CARRIER: "{{KT_CARRIER}}"
      WPAGE: "WEB"
      PRCODE: ""
      AMOUNT: "{{KT_AMOUNT}}"
      TERMSAGREE1: "Y"
      TERMSAGREE2: "N|N"
      TERMSAGREE3: "N"
      ISAPPOTP: "N"
      IFVERSION: "V1.2.10"      
      OUTPUTOPTION: "1"
      COMMAND: "IDELIVER"
      IPADDR : "{{IP_R}}"
      SMTOTP: "N"
      # IDELIVER에서 전달하지 않고 다음 스텝에서 전달
      ISCPIN: "N"
      CPIN: "******"
      ISSPY: "N"
      ISLGPAY: "N"
      ISVACS: "Y"
      ISAUTOVACS: "N"
      ISPASSOPTINABLE: "Y"
      ISCPINCHKABLE: "N"
      ISIGNORECPIN: "N"
      IsPreOtbill: "N"
    
    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "ID_RESULT"

      - name: "serverInfo"
        pattern: "ServerInfo"
        variable: "ID_SERVER_INFO"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "ID_ERROR_MSG"

      - name: "cap"
        pattern: "CAP"
        variable: "ID_CAP"

      - name: "ANSIMMEMBER"
        pattern: "ANSIMMEMBER"
        variable: "ID_ANSIMMEMBER"

      - name: "ARSCHANGE"
        pattern: "ARSCHANGE"
        variable: "ID_ARSCHANGE"

      - name: "UAM"
        pattern: "UAM"
        variable: "ID_UAM"
        
      - name: "ISLGPWDUSER"
        pattern: "ISLGPWDUSER"
        variable: "ID_ISLGPWDUSER"

      - name: "ISPROM"
        pattern: "ISPROM"
        variable: "ID_ISPROM"

      - name: "PROM_AMT"
        pattern: "PROM_AMT"
        variable: "ID_PROM_AMT"

      - name: "ISCARRIERPROM"
        pattern: "ISCARRIERPROM"
        variable: "ID_ISCARRIERPROM"

      - name: "ISCPIN"
        pattern: "ISCPIN"
        variable: "ID_ISCPIN"

      - name: "AUTHKEY"
        pattern: "AUTHKEY"
        variable: "ID_AUTHKEY"

      - name: "USEDPCIKRW"
        pattern: "USEDPCIKRW"
        variable: "ID_USEDPCIKRW"

      - name: "USECOUPON"
        pattern: "USECOUPON"
        variable: "ID_USECOUPON"

      - name: "COUPONAMT"
        pattern: "COUPONAMT"
        variable: "ID_COUPONAMT"

      - name: "DEPOSIT_AMT"
        pattern: "DEPOSIT_AMT"
        variable: "ID_DEPOSIT_AMT"

      - name: "ISDEPOSIT"
        pattern: "ISDEPOSIT"
        variable: "ID_ISDEPOSIT"

      - name: "ISPASSOPTIN"
        pattern: "ISPASSOPTIN"
        variable: "ID_ISPASSOPTIN"

      - name: "ISFDS"
        pattern: "ISFDS"
        variable: "ID_ISFDS"

      - name: "OTP"
        pattern: "OTP"
        variable: "ID_OTP"
      
    
########################################################### Assertion ###########################################################

    test:
      # KT 휴대폰결제 미동의 상태인 경우 해당 검증만 진행
      - run_if: "ID_ISPASSOPTIN == Y"
        assertions:
          - name: "미동의 상태_거래 인증 key(ServerInfo) 정상 출력_1"
            description: "거래 인증 key 존재하거나 이전 시나리오와 일치 확인"
            assertion: "js: ID_SERVER_INFO && ID_SERVER_INFO == SERVER_INFO"

          - name: "미동의 상태_거래 인증 key(ServerInfo) 정상 출력_2"
            description: "거래 인증 key 영문 + 숫자만 허용, 공백 포함 모든 특수문자 불가 및 UTF-8 기준 128 byte 이하 확인"
            assertion: "js: ID_SERVER_INFO && /^[A-Za-z0-9]+$/.test(ID_SERVER_INFO) && new TextEncoder().encode(ID_SERVER_INFO).length <= 128"

          - name: "미동의 상태_결과 코드(RESULT) 정상 출력"
            assertion: "ID_RESULT == 0"

          - name: "미동의 상태_결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ID_ERROR_MSG == No Information"

          - name: "미동의 상태_휴대폰 결제 동의 PASS 앱 이용 대상 여부(ISPASSOPTIN) 정상 출력"
            assertion: "ID_ISPASSOPTIN == Y"

      # KT 휴대폰결제 차단 상태인 경우 해당 검증 진행
      - run_if: "ID_RESULT == 422"
        assertions:
          - name: "차단 상태_결과 코드(RESULT) 정상 출력"
            assertion: "ID_RESULT == 422"

          - name: "차단 상태_결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ID_ERROR_MSG == 통신사 정책에 의한 휴대폰결제 차단 상태입니다. 해당 통신사 고객센터(114)/홈페이지/고객센터 APP에서 휴대폰결제 차단 해제 후 이용하십시오."

      # KT 휴대폰결제 동의 상태인 경우 해당 검증만 진행
      - run_if: "ID_ISPASSOPTIN == N"
        assertions:
          - name: "거래 인증 key(ServerInfo) 정상 출력_1"
            description: "거래 인증 key 존재하거나 이전 시나리오와 일치 확인"
            assertion: "js: ID_SERVER_INFO && ID_SERVER_INFO == SERVER_INFO"

          - name: "거래 인증 key(ServerInfo) 정상 출력_2"
            description: "거래 인증 key 영문 + 숫자만 허용, 공백 포함 모든 특수문자 불가 및 UTF-8 기준 128 byte 이하 확인"
            assertion: "js: ID_SERVER_INFO && /^[A-Za-z0-9]+$/.test(ID_SERVER_INFO) && new TextEncoder().encode(ID_SERVER_INFO).length <= 128"

          - name: "결과 코드(RESULT) 정상 출력"
            assertion: "ID_RESULT == 0"

          - name: "결과 메시지(ErrMsg) 정상 출력" 
            assertion: "ID_ERROR_MSG == No Information"

          # 개인정보 (잔여한도 금액) 미전달
          - name: "잔여한도 금액(CAP) 정상 출력"
            assertion: "ID_CAP == 000000"

          - name: "안심결제 회원 여부(ANSIMMEMBER) 정상 출력"
            assertion: "ID_ANSIMMEMBER == Y"

          - name: "ARS 전환 지원(ARSCHANGE) 정상 출력"
            assertion: "ID_ARSCHANGE == N"

          - name: "인증 방식(UAM) 정상 출력"
            assertion: "ID_UAM == 0"

          - name: "LGU+ 휴대폰결제 비밀번호 사용 여부(ISLGPWDUSER) 정상 출력"
            assertion: "ID_ISLGPWDUSER == N"

          - name: "즉시 할인용(ISPROM) 정상 출력"
            assertion: "ID_ISPROM == N"

          - name: "프로모션 할인금액(PROM_AMT) 정상 출력"
            assertion: "ID_PROM_AMT == 0"

          - name: "통신사 프로모션 적용 여부(ISCARRIERPROM) 정상 출력"
            assertion: "ID_ISCARRIERPROM == N"

          - name: "휴대폰결제 비밀번호 사용 여부(ISCPIN) 정상 출력"
            assertion: "ID_ISCPIN == N"

          - name: "사용자 인증 KEY(AUTHKEY) 정상 출력"
            assertion: "ID_AUTHKEY == NA"

          - name: "사용된 PCI(USEDPCIKRW) 정상 출력"
            assertion: "ID_USEDPCIKRW == 0"

          - name: "쿠폰 적용 여부(USECOUPON) 정상 출력"
            assertion: "ID_USECOUPON == N"

          - name: "쿠폰 할인 금액(COUPONAMT) 정상 출력"
            assertion: "ID_COUPONAMT == 0"

          - name: "보증금 금액(DEPOSIT_AMT) 정상 출력"
            assertion: "ID_DEPOSIT_AMT == 0"

          - name: "보증금 사용 여부(ISDEPOSIT) 정상 출력"
            assertion: "ID_ISDEPOSIT == N"

          - name: "휴대폰 결제 동의 PASS 앱 이용 대상 여부(ISPASSOPTIN) 정상 출력"
            assertion: "ID_ISPASSOPTIN == N"

          - name: "FDS 거래 여부(ISFDS) 미출력 확인"
            description: "IDELIVER 전문 V1.2.10 규격 미응답 필드 확인"
            assertion: "js: (() => {
              if (typeof  ID_ISFDS === 'undefined') return true;
              if ( ID_ISFDS === null) return true;
              if (String( ID_ISFDS).trim() === '') return true;
              return false;})()"

          - name: "승인 번호(OTP) 미출력 확인"
            assertion: "ID_OTP == ''"


# ** ----------------------------------------------------------------------------------------------------------------
#  * [3차 호출] IREPORT
#  * ----------------------------------------------------------------------------------------------------------------*


  - name: "IREPORT"
    description: "승인번호 확인 요청"
    
    args:
      ServerInfo: "{{SERVER_INFO}}"
      Command: "IREPORT"
      Configure: "FAILURE"
      IFVERSION: "V1.1.9"
      TERMSAGREE2: "N"
      WPRCODE: "0000"
      ANSIMMEMBER: "Y"  # 안심결제 가입
      ANSIMPASS: "5857"  # 안심결제 비밀번호
      OTP: "123456"
      ISCPIN: "N"
      CPIN: "663466"
      EMAIL: "{{EMAIL}}"
      OUTPUTOPTION: "1"
    
    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "IR_RESULT"

      - name: "serverInfo"
        pattern: "ServerInfo"
        variable: "IR_SERVER_INFO"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "IR_ERROR_MSG"
    

    # KT 통신사 휴대폰결제 차단/미동의 상태인 경우 해당 시나리오 Skip 처리
    skip_if:
      - condition: "js: (ID_RESULT == 422 || ID_ISPASSOPTIN == Y)"
        action: "skip_remaining_steps"
        reason: "KT 통신사 휴대폰결제 차단/미동의 상태로 이후 시나리오를 진행하지 않음"


########################################################### Assertion ###########################################################

    test:
      - name: "결과 코드(RESULT) 482 출력 확인"
        assertion: "IR_RESULT == 482"

      - name: "결과 메시지(ErrMsg) 불일치 출력 확인"
        assertion: "IR_ERROR_MSG == 승인 번호가 일치하지 않습니다. 확인 후 다시 시도해 주십시오."


# ** ----------------------------------------------------------------------------------------------------------------
#  * [4차 호출] NCONFIRM
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "NCONFIRM"
    description: "결제정보 검증 요청"
    
    args:
      ServerInfo: "{{SERVER_INFO}}"
      Command: "NCONFIRM"
      OUTPUTOPTION: "DEFAULT"
      ConfirmOption: "1"
      CPID: "{{MERCHANT_ID}}"
      AMOUNT: "301"
    
    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "NC_RESULT"

      - name: "serverInfo"
        pattern: "ServerInfo"
        variable: "NC_SERVER_INFO"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "NC_ERROR_MSG"
    
    # KT 통신사 휴대폰결제 차단/미동의 상태인 경우 해당 시나리오 Skip 처리
    skip_if:
      - condition: "js: (ID_RESULT == 422 || ID_ISPASSOPTIN == Y)"
        action: "skip_remaining_steps"
        reason: "KT 통신사 휴대폰결제 차단/미동의 상태로 이후 시나리오를 진행하지 않음"


########################################################### Assertion ###########################################################

    test:
      - name: "결과 코드(RESULT) 492 출력 확인"
        assertion: "NC_RESULT == 492"

      - name: "결과 메시지(ErrMsg) 승인 절차 미완료 출력 확인"
        assertion: "NC_ERROR_MSG == 승인 절차를 모두 거치지 않고 거래가 시도되었습니다. 다시 시도해 주십시오."


# ** ----------------------------------------------------------------------------------------------------------------
#  * [5차 호출] NBILL
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "NBILL"
    description: "결제 요청"
    
    args:
      ServerInfo: "{{SERVER_INFO}}"
      BillOption: "1"
      Command: "NBILL"
      OUTPUTOPTION: "DEFAULT"
    
    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "NB_RESULT"

      - name: "serverInfo"
        pattern: "ServerInfo"
        variable: "NB_SERVER_INFO"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "NB_ERROR_MSG"
    

    # KT 통신사 휴대폰결제 차단/미동의 상태인 경우 해당 시나리오 Skip 처리
    skip_if:
      - condition: "js: (ID_RESULT == 422 || ID_ISPASSOPTIN == Y)"
        action: "skip_remaining_steps"
        reason: "KT 통신사 휴대폰결제 차단/미동의 상태로 이후 시나리오를 진행하지 않음"

        
########################################################### Assertion ###########################################################

    test:
      - name: "결과 코드(RESULT) 492 출력 확인"
        assertion: "NB_RESULT == 492"
        
      - name: "결과 메시지(ErrMsg) 승인 절차 미완료 출력 확인"
        assertion: "NB_ERROR_MSG == 승인 절차를 모두 거치지 않고 거래가 시도되었습니다. 다시 시도해 주십시오."


# 시나리오 설정
options:
  stopOnError: false
  timeout: 15000
  retryCount: 0