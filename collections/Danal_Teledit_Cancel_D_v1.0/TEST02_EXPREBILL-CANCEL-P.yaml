        assertion: "c_RESULT == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "c_ErrMsg == No Information"

      - name: "원거래 번호(OTID) 정상 출력"
        description: 2차 부분 취소 TID와 1차 부분 취소 TID 일치 확인
        assertion: "js: c_OTID && c_OTID === C_OTID"

      - name: "거래인증 key(ServerInfo) 정상 출력"
        assertion: "js: c_ServerInfo !== null && c_ServerInfo.trim().length > 0 && typeof c_ServerInfo !== undefined" 

      - name: "거래 번호(DNTID) 정상 출력_1"
        assertion: "js: c_DNTID && c_DNTID.trim().length > 0 && /^\\d{22}$/.test(c_DNTID)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "1차 CANCEL 부분 취소 DNTID와 다른 값 생성 확인"
        assertion: "js: (() => {
          'use strict';
          if (typeof c_DNTID === 'undefined' || typeof C_DNTID === 'undefined') return false;
          return String(c_DNTID).trim() !== String(C_DNTID).trim();})()"

      - name: "결제 완료 시간(Date) 정상 출력"
        description: "Date가 존재하고 숫자 14자리인지 검증"
        assertion: "js: c_DATE && c_DATE.trim().length > 0 && /^\\d{14}$/.test(c_DATE)"

      - name: "결제 완료 시간(Date) 정상 출력_2"
        description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~5분 중 하나라도 일치하면 PASS 처리"
        assertion: "js: (() => {
          if (!c_DATE || c_DATE.length < 12) return false;

          const tidPrefix = c_DATE.slice(0, 12);

          const pad = n => String(n).padStart(2, '0');
          const now = new Date();

          for (let i = 0; i <= 5; i++) {
            const d = new Date(now);
            d.setMinutes(d.getMinutes() - i);

            const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
            if (tidPrefix === t) return true;
          }
          return false;})()"

      - name: "남은 금액(RAMT) 정상 출력"
        description: "CANCELOPTION 설정에 따른 남은 금액 정상 출력 확인"
        assertion: "js: c_RAMT && c_RAMT == 151"

# ** ----------------------------------------------------------------------------------------------------------------
#  * CANCEL - 3차 원거래 TID 사용 부분 취소
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "CANCEL - 3차 부분 취소"
    description: "원거래 TID 사용 3차 부분 취소 및 환불 정상 확인"

    args:
      Command: "CANCEL"
      IFVERSION: "V0.0.0"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      OTID: "{{c_OTID}}"  # 원거래 TID를 이용
      CANCELTYPE: "P"  # 부분 취소 설정
      AMOUNT: "10"
      CANCELOPTION: "0"  # RAMT 응답 미설정
      sleepDuration: 20000   # 데이터 적재 대기 시간 (밀리초)
  
  # 응답 데이터 추출
    extract:
      - name: "Result"
        pattern: "Result"
        variable: "P_RESULT"

      - name: "ErrMsg"
        pattern: "ErrMsg"
        variable: "P_ErrMsg"

      - name: "OTID"
        pattern: "OTID"
        variable: "P_OTID"  

      - name: "ServerInfo"
        pattern: "ServerInfo"
        variable: "P_ServerInfo" 

      - name: "DNTID"
        pattern: "DNTID"
        variable: "P_DNTID"

      - name: "DNTID"
        pattern: "js: String(vars.P_DNTID).slice(4)"
        variable: "NEW_TID"
        
      - name: "Date"
        pattern: "Date"
        variable: "P_DATE"

      - name: "RAMT"
        pattern: "RAMT"
        variable: "P_RAMT"

    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "P_RESULT == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "P_ErrMsg == No Information"

      - name: "원거래 번호(OTID) 정상 출력"
        description: 3차 부분 취소 TID와 2차 부분 취소 TID 일치 확인
        assertion: "js: P_OTID && P_OTID === c_OTID"

      - name: "거래인증 key(ServerInfo) 정상 출력"
        assertion: "js: P_ServerInfo !== null && P_ServerInfo.trim().length > 0 && typeof P_ServerInfo !== undefined" 

      - name: "거래 번호(DNTID) 정상 출력_1"
        assertion: "js: P_DNTID && P_DNTID.trim().length > 0 && /^\\d{22}$/.test(P_DNTID)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "2차 CANCEL 부분 취소 DNTID와 다른 값 생성 확인"
        assertion: "js: (() => {
          'use strict';
          if (typeof P_DNTID === 'undefined' || typeof c_DNTID === 'undefined') return false;
          return String(c_DNTID).trim() !== String(P_DNTID).trim();})()"

      - name: "결제 완료 시간(Date) 정상 출력_1"
        description: "Date가 존재하며 14자리 숫자 검증"
        assertion: "js: P_DATE && P_DATE.trim().length > 0 && /^\\d{14}$/.test(P_DATE)"

      - name: "결제 완료 시간(Date) 정상 출력_2"
        description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~5분 중 하나라도 일치하면 PASS 처리"
        assertion: "js: (() => {
          if (!P_DATE || P_DATE.length < 12) return false;

          const tidPrefix = P_DATE.slice(0, 12);

          const pad = n => String(n).padStart(2, '0');
          const now = new Date();

          for (let i = 0; i <= 5; i++) {
            const d = new Date(now);
            d.setMinutes(d.getMinutes() - i);

            const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
            if (tidPrefix === t) return true;
          }
          return false;})()"

      - name: "남은 금액(RAMT) 정상 미출력"
        description: "RAMT가 정의되어 있고 값이 존재하면 실패"
        assertion: "js: (() => {
          if (typeof D_RAMT === 'undefined') return true;
          if (D_RAMT === null) return true;
          if (String(D_RAMT).trim() === '') return true;
          return false;})()"

