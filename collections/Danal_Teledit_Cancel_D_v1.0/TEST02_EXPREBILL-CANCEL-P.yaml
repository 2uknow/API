
name: "EXPREBILL-CANCEL SMS 비점유결제 부분취소"
description: "Danal_Taldit_Cancel_v1.0 자동화 테스트"
version: "1.0.0"


# 공통 변수 불러오기
include: Danal_Teledit_Cancel_D_v1.0/conf.yaml


# ** ----------------------------------------------------------------------------------------------------------------
#  * EXPREBILL - 1회차
#  * ----------------------------------------------------------------------------------------------------------------*

steps:
  - name: "EXPREBILL - 1회차"
    description: "비점유 결제 + AUTHKEY 전송"

    args:
      Command: "EXPREBILL"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      ItemCount: "1"
      ItemType: "0"
      ItemInfo: "2|301|1|22S0HZ0100|상품명"
      AUTHKEY: "{{SKT_AUTH}}"
      ORDERID: "{{ORDER_ID_R}}"
      OUTPUTOPTION: "3"
      TIDTYPE: "1"
      IFVERSION: "V1.1.2"
      BILLTYPE: "1"

    # 응답 데이터 추출
    extract:
      - name: "result"
        pattern: "Result"
        variable: "RESULT_CODE"

      - name: "errMsg"
        pattern: "ErrMsg"
        variable: "ERROR_MESSAGE"

      - name: "tid"
        pattern: "TID"
        variable: "TID"

      - name: "date"
        pattern: "Date"
        variable: "DATE"

      - name: "totalAmount"
        pattern: "TotalAmount"
        variable: "TOTAL_AMOUNT"

      - name: "cap"
        pattern: "Cap"
        variable: "CAP"
        
      - name: "orderid"
        pattern: "Orderid"
        variable: "ORDER_ID"

      - name: "dstAddr"
        pattern: "DstAddr"
        variable: "DSTADDR"

      - name: "carrier"
        pattern: "Carrier"
        variable: "CARRIER"

      - name: "dntid"
        pattern: "Dntid"
        variable: "DN_TID"
    
####################################################### Assertion ###########################################################

    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "RESULT_CODE == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력" 
        assertion: "ERROR_MESSAGE == No Information"
            
      - name: "거래 번호(TID) 정상 출력"
        assertion: "js: TID && TID.trim().length > 0 && /^\\d{18}$/.test(TID)"

      - name: "결제 완료 시간(Date) 정상 출력_1"
        assertion: "js: DATE && DATE.trim().length > 0 && /^\\d{14}$/.test(DATE)"

      - name: "결제 완료 시간(Date) 정상 출력_2"
        description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~5분 중 하나라도 일치하면 PASS 처리"
        assertion: "js: (() => {
          if (!DATE || DATE.length < 12) return false;

          const tidPrefix = DATE.slice(0, 12);

          const pad = n => String(n).padStart(2, '0');
          const now = new Date();

          for (let i = 0; i <= 5; i++) {
            const d = new Date(now);
            d.setMinutes(d.getMinutes() - i);

            const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
            if (tidPrefix === t) return true;
          }
          return false;})()"

      - name: "전체 결제금액(TotalAmount) 정상 출력"
        assertion: "TOTAL_AMOUNT == 301"
      
      - name: "거래 전 한도 금액(CAP) 정상 출력"
        assertion: "CAP == 000000"

      - name: "CP 주문번호(ORDERID) 정상 출력"
        assertion: "js: (
          typeof ORDER_ID !== 'undefined' &&
          typeof ORDER_ID === 'string' &&
          ORDER_ID.trim().length > 0 &&
          ORDER_ID.includes('ORD'))"

      - name: "사용자 전화번호(DstAddr) 정상 출력"
        assertion: "DSTADDR == 01079266634"

      - name: "인증 받은 통신사 정보(Carrier) 정상 출력"
        assertion: "CARRIER == SKT"

      - name: "거래 번호(DNTID) 정상 출력_1"
        assertion: "js: DN_TID && DN_TID.trim().length > 0 && /^\\d{22}$/.test(DN_TID)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "DN_TID = yyyy + 원거래 TID 일치 확인"
        assertion: "js: (() => {
          const pad = n => String(n).padStart(2,'0');
          const d = new Date();
          const now12 = `${d.getFullYear()}`;
          return DN_TID = now12 + TID;})()"


# ** ----------------------------------------------------------------------------------------------------------------
#  * CANCEL - 1차 원거래 TID 사용 부분 취소
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "CANCEL - 1차 부분 취소"
    description: "원거래 TID 사용 1차 부분 취소 및 환불 정상 확인"

    args:
      Command: "CANCEL"
      IFVERSION: "V0.0.0"
      ID: "{{MERCHANT_ID}}"
      PWD: "{{MERCHANT_PWD}}"
      OTID: "{{TID}}"  # 원거래 TID를 이용
      CANCELTYPE: "P"  # 부분 취소 설정
      AMOUNT: "100"
      CANCELOPTION: "1"  # RAMT 응답 설정
      sleepDuration: 20000   # 데이터 적재 대기 시간 (밀리초)
  
  # 응답 데이터 추출
    extract:
      - name: "Result"
        pattern: "Result"
        variable: "C_RESULT"

      - name: "ErrMsg"
        pattern: "ErrMsg"
        variable: "C_ErrMsg"

      - name: "OTID"
        pattern: "OTID"
        variable: "C_OTID"  

      - name: "ServerInfo"
        pattern: "ServerInfo"
        variable: "C_ServerInfo" 

      - name: "DNTID"
        pattern: "DNTID"
        variable: "C_DNTID"
        
      - name: "Date"
        pattern: "Date"
        variable: "C_DATE"

      - name: "RAMT"
        pattern: "RAMT"
        variable: "C_RAMT"

    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "C_RESULT == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "C_ErrMsg == No Information"

      - name: "원거래 번호(OTID) 정상 출력"
        description: 1차 부분취소 TID와 원거래 TID 일치 확인
        assertion: "js: C_OTID && C_OTID === TID"

      - name: "거래인증 key(ServerInfo) 정상 출력"
        assertion: "js: C_ServerInfo !== null && C_ServerInfo.trim().length > 0 && typeof C_ServerInfo !== undefined" 

      - name: "거래 번호(DNTID) 정상 출력_1"
        assertion: "js: C_DNTID && C_DNTID.trim().length > 0 && /^\\d{22}$/.test(C_DNTID)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "EXPREBILL DNTID와 다른 값 생성 확인"
        assertion: "js: (() => {
          'use strict';
          if (typeof C_DNTID === 'undefined' || typeof DN_TID === 'undefined') return false;
          return String(C_DNTID).trim() !== String(DN_TID).trim();})()"

      - name: "결제 완료 시간(Date) 정상 출력_1"
        description: "Date가 존재하고 숫자 14자리인지 검증"
        assertion: "js: C_DATE && C_DATE.trim().length > 0 && /^\\d{14}$/.test(C_DATE)"

      - name: "결제 완료 시간(Date) 정상 출력_2"
        description: "결제 완료 시간(Date)가 현재 시각(yyyymmddhhmm) 기준 +1~5분 중 하나라도 일치하면 PASS 처리"
        assertion: "js: (() => {
          if (!C_DATE || C_DATE.length < 12) return false;

          const tidPrefix = C_DATE.slice(0, 12);

          const pad = n => String(n).padStart(2, '0');
          const now = new Date();

          for (let i = 0; i <= 5; i++) {
            const d = new Date(now);
            d.setMinutes(d.getMinutes() - i);

            const t = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
            if (tidPrefix === t) return true;
          }
          return false;})()"

      - name: "남은 금액(RAMT) 정상 출력"
        description: "CANCELOPTION 설정에 따른 남은 금액 정상 출력 확인"
        assertion: "js: C_RAMT && C_RAMT == 201"


# ** ----------------------------------------------------------------------------------------------------------------
