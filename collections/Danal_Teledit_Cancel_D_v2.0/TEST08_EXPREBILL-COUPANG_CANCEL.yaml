      - name: "HTTP 응답 상태 확인"
        assertion: "HTTP_STATUS_3 == 200"

      - name: "응답 본문 존재 확인"
        assertion: "RESPONSE_BODY_3 exists"

      - name: "응답 본문 길이 확인"
        assertion: "js: RESPONSE_BODY_3 && RESPONSE_BODY_3.length > 0"


# ** ----------------------------------------------------------------------------------------------------------------
#  * 취소금액(CAMT) 미요청 - COUPANG CANCEL 응답 복호화 및 검증
#  * ----------------------------------------------------------------------------------------------------------------*

  - name: "취소금액(CAMT) 미요청 - COUPANG CANCEL 응답 복호화 및 검증"
    description: "HTTP 응답에서 받은 실제 암호화된 데이터를 복호화 후 검증"
    type: "crypto"

    args:
      operation: "decrypt"
      key: "{{CRYPTOKEY}}"
      data: "{{SERVER_ENCRYPTED_DATA_3}}"
      sleepDuration: 29000   # 암호화 후 대기 시간 (밀리초)
      

    # 복호화 결과 추출 (자동 파싱된 필드들)
    extract:
      - name: "result"
        pattern: "result"
        variable: "CPCENCEL_RESULT_4"

      - name: "errmsg"
        pattern: "errmsg"
        variable: "CPCENCEL_ERRMSG_4"

      - name: "tid"
        pattern: "tid"
        variable: "CPCENCEL_TID_4"

      - name: "dntid"
        pattern: "dntid"
        variable: "CPCENCEL_DNTID_4"

      - name: "date"
        pattern: "date"
        variable: "CPCENCEL_DATE_4"

      - name: "otid"
        pattern: "otid"
        variable: "CPCENCEL_OTID_4"

      - name: "orderid"
        pattern: "orderid"
        variable: "CPCENCEL_ORDERID_4"

      - name: "remainamt"
        pattern: "remainamt"
        variable: "CPCENCEL_REMAINAMT_4"

      - name: "cancelamt"
        pattern: "cancelamt"
        variable: "CPCENCEL_CANCELAMT_4"


    # SKT 통신사 휴대폰결제 차단/미동의 상태인 경우 해당 시나리오 Skip 처리
    skip_if:
      - condition: "js: (RESULT_CODE == 422 || RESULT_CODE == 531)"
        action: "skip_remaining_steps"
        reason: "SKT 통신사 휴대폰결제 차단/미동의 상태로 이후 시나리오를 진행하지 않음"


##############################################  Assertion  ###################################################


    test:
      - name: "결과 코드(RESULT) 정상 출력"
        assertion: "js: CPCENCEL_RESULT_4 && CPCENCEL_RESULT_4 == 0"

      - name: "결과 메시지(ErrMsg) 정상 출력"
        assertion: "js: CPCENCEL_ERRMSG_4 && CPCENCEL_ERRMSG_4 == 'No Information'"
      
      - name: "거래 번호(TID) 정상 출력"
        description: "복호화된 취소 거래번호가 존재하고 18자리인지 확인"
        assertion: "js: (
          CPCENCEL_TID_4 !== null &&
          typeof CPCENCEL_TID_4 !== 'undefined' &&
          typeof CPCENCEL_TID_4 === 'string' &&
          CPCENCEL_TID_4.trim().length === 18)"

      - name: "거래 번호(DNTID) 정상 출력_1"
        description: "복호화된 DNTID가 존재하고 22자리인지 확인"
        assertion: "js: CPCENCEL_DNTID_4 && CPCENCEL_DNTID_4.trim().length > 0 && /^\\d{22}$/.test(CPCENCEL_DNTID_4)"

      - name: "거래 번호(DNTID) 정상 출력_2"
        description: "복호화된 DNTID = yyyy + 원거래 TID 일치 확인"
        assertion: "js: (() => {
          const pad = n => String(n).padStart(2,'0');
          const d = new Date();
          const now12 = `${d.getFullYear()}`;
          return CPCENCEL_DNTID_4 = now12 + TID;})()"

      - name: "취소 일시(DATE) 정상 출력_1"
        description: "복호화된 취소 일시가 존재하고 14자리인지 확인"
        assertion: "js: (
          CPCENCEL_DATE_4 !== null &&
          typeof CPCENCEL_DATE_4 !== 'undefined' &&
          typeof CPCENCEL_DATE_4 === 'string' &&
          CPCENCEL_DATE_4.trim().length === 14)"

      - name: "취소 일시(DATE) 정상 출력_2"
        description: "Date가 현재 시각(yyyymmddhhmm)과 현재 기준 ±1분 허용 확인"
        assertion: "js: (() => {
          if (!CPCENCEL_DATE_4 || CPCENCEL_DATE_4.length < 12) return false;

          const y = Number(CPCENCEL_DATE_4.slice(0, 4));
          const mo = Number(CPCENCEL_DATE_4.slice(4, 6)) - 1;
          const d = Number(CPCENCEL_DATE_4.slice(6, 8));
          const h = Number(CPCENCEL_DATE_4.slice(8, 10));
          const mi = Number(CPCENCEL_DATE_4.slice(10, 12));

          const target = new Date(y, mo, d, h, mi);
          const now = new Date();

          const diffMin = Math.abs((now - target) / 1000 / 60);

          return diffMin <= 2;})()"

      - name: "원본 거래번호(OTID) 정상 출력"
        description: "복호화된 원본 TID가 최초 결제 TID와 일치하는지 확인"
        assertion: "js: CPCENCEL_OTID_4 && CPCENCEL_OTID_4 === CPCENCEL_TID_2"

      - name: "주문번호(Orderid) 정상 출력"
        description: "복호화된 주문번호가 원본 주문번호 + 추가 문구 확인"
        assertion: "js: (
          typeof CPCENCEL_ORDERID_4 !== 'undefined' &&
          typeof CPCENCEL_ORDERID_4 === 'string' &&
          CPCENCEL_ORDERID_4.trim().length > 0 &&
          CPCENCEL_ORDERID_4.includes(RESPONSE_ORDER_ID))"


# 시나리오 설정
options:
  stopOnError: false
  timeout: 5000000000
  retryCount: 0